name: Build and Release Windows EXE

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version label for manual artifact naming (example: v0.1.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p vrl-osc-core --bin vibealong --release

      - name: Resolve version label
        id: meta
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $version = $env:GITHUB_REF_NAME
          } elseif ("${{ inputs.version }}" -ne "") {
            $version = "${{ inputs.version }}"
          } else {
            $cargoToml = Get-Content "packages/core-rs/Cargo.toml" -Raw
            $match = [regex]::Match($cargoToml, '(?m)^version\s*=\s*"([^"]+)"\s*$')
            if ($match.Success) {
              $crateVersion = $match.Groups[1].Value
            } else {
              $crateVersion = "0.0.0"
            }
            $shortSha = $env:GITHUB_SHA.Substring(0, 7)
            $version = "v$crateVersion-main-$shortSha"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Package artifacts and checksums
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $exeName = "Vibealong-$version.exe"
          $zipName = "Vibealong-$version-windows-x64.zip"

          Copy-Item "target/release/vibealong.exe" "dist/$exeName" -Force
          Compress-Archive -Path "dist/$exeName" -DestinationPath "dist/$zipName" -Force

          $exeHash = (Get-FileHash "dist/$exeName" -Algorithm SHA256).Hash.ToLower()
          $zipHash = (Get-FileHash "dist/$zipName" -Algorithm SHA256).Hash.ToLower()

          @"
          $exeHash  $exeName
          $zipHash  $zipName
          "@ | Out-File "dist/SHA256SUMS.txt" -Encoding ascii

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibealong-${{ steps.meta.outputs.version }}-windows
          path: dist/*
          if-no-files-found: error

      - name: Build release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.TrimStart('v')
          $content = Get-Content "CHANGELOG.md" -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\][\s\S]*?(?=^## \[|\z)"
          $match = [regex]::Match($content, $pattern)

          if ($match.Success) {
            $notes = $match.Value.Trim()
          } else {
            $notes = "Release $tag`n`nNo matching CHANGELOG section found for [$version]."
          }

          $notesPath = "dist/RELEASE_NOTES.md"
          $notes | Out-File -FilePath $notesPath -Encoding utf8
          "notes_path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: Vibealong ${{ github.ref_name }}
          prerelease: false
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            dist/Vibealong-${{ steps.meta.outputs.version }}.exe
            dist/Vibealong-${{ steps.meta.outputs.version }}-windows-x64.zip
            dist/SHA256SUMS.txt
