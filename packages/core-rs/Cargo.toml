[package]
name = "vrl-osc-core"
version = "0.1.0"
edition = "2021"
license = "UNLICENSED"
publish = false

[lib]
name = "vrl_osc_core"
path = "src/lib.rs"

[[bin]]
name = "vibealong"
path = "src/bin/vrl_bridge_desktop.rs"

[[bin]]
name = "vibealong-mvp"
path = "src/bin/vrl_bridge_mvp.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rusqlite = { version = "0.32", features = ["bundled"] }
url = "2.5"
uuid = { version = "1.11", features = ["v4"] }
keyring = { version = "3.6", features = ["windows-native"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
httpdate = "1.0"
chrono = "0.4"
clap = { version = "4.5", features = ["derive"] }
ctrlc = "3.4"
eframe = "0.31"
mdns-sd = "0.11"
tungstenite = "0.24"
single-instance = "0.3"
tray-icon = "0.19"
image = { version = "0.25", default-features = false, features = ["png"] }
webbrowser = "1.0"

[target.'cfg(windows)'.dependencies]
winreg = "0.52"

[target.'cfg(windows)'.build-dependencies]
ico = "0.4"
image = { version = "0.25", default-features = false, features = ["png"] }
winres = "0.1"
